<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>75볼 빙고 드로우 (Bingo Caller)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    #container {
      flex: 1;
      display: flex;
      padding: 1.5vw;
      gap: 2vw;
      box-sizing: border-box;
    }
    #board {
      flex: 7;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0.6vw;
      background: #222;
      padding: 1.5vw;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    .cell {
      background: #333;
      border: 2px solid #555;
      border-radius: 8px;           /* 평소 살짝 둥근 사각형 */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2vw;
      font-weight: bold;
      aspect-ratio: 1 / 1;
      transition: all 0.5s ease;
      color: #ddd;
    }
    .called {
      background: #c00;
      border: 4px solid #ff4444;
      border-radius: 50%;           /* 드로우 시 원형 */
      color: white;
      box-shadow: 0 0 25px #f00, inset 0 0 15px #800;
      transform: scale(1.08);
      font-size: 2.4vw;
    }
    #side {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 2vh;
    }
    #recent {
      background: #1a1a1a;
      padding: 1.5vh 2vw;
      border-radius: 10px;
      min-height: 40vh;
      overflow-y: auto;
    }
    #recent h2 {
      margin: 0 0 1vh;
      color: #ffdddd;
      text-align: center;
    }
    .recent-item {
      font-size: 3.5vw;
      text-align: center;
      padding: 1vh 0;
      border-bottom: 1px solid #444;
      opacity: 0.6;
      transition: all 0.5s;
    }
    .recent-item:first-child {
      color: #ff0000;
      font-weight: bold;
      opacity: 1;
      font-size: 5vw;
    }
    #status {
      text-align: center;
      font-size: 2.8vw;
      padding: 1vh;
      background: #222;
      border-radius: 8px;
    }
    #bigcall {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18vw;
      color: #ff0000;
      font-weight: bold;
      text-shadow: 0 0 40px #f00, 0 0 80px #800;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s;
      z-index: 100;
    }
    #controls {
      text-align: center;
      padding: 1vh;
      font-size: 1.5vw;
      background: rgba(0,0,0,0.5);
    }
    button {
      font-size: 1.8vw;
      padding: 0.8vh 2vw;
      margin: 0 1vw;
      background: #006600;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #008800; }
  </style>
</head>
<body>

<div id="bigcall"></div>

<div id="container">
  <div id="board"></div>

  <div id="side">
    <div id="recent">
      <h2>최근 드로우 (최신 위)</h2>
      <div id="recent-list"></div>
    </div>
    <div id="status">Draws: 0 / 75  |  SPACE 또는 클릭으로 드로우</div>
  </div>
</div>

<div id="controls">
  <button onclick="toggleFullScreen()">전체화면 (F11)</button>
  <button onclick="resetGame()">새 게임 시작</button>
</div>

<script>
const board = document.getElementById('board');
const recentList = document.getElementById('recent-list');
const statusEl = document.getElementById('status');
const bigcall = document.getElementById('bigcall');

let numbers = Array.from({length:75}, (_,i)=>i+1);
let called = new Set();
let recent = [];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function initBoard() {
  board.innerHTML = '';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 15; col++) {
      const num = row * 15 + col + 1;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = num;
      cell.dataset.num = num;
      board.appendChild(cell);
    }
  }
}

function drawNumber() {
  if (called.size >= 75) {
    alert("모든 숫자가 나왔습니다!");
    return;
  }

  if (numbers.length === 0) shuffle(numbers);

  const num = numbers.pop();
  called.add(num);

  // 보드 업데이트
  const cell = board.querySelector(`[data-num="${num}"]`);
  if (cell) cell.classList.add('called');

  // 최근 목록 (최대 5개)
  recent.unshift(num);
  if (recent.length > 5) recent.pop();

  recentList.innerHTML = recent.map((n,i) => `<div class="recent-item">${n}</div>`).join('');

  // 상태 업데이트
  statusEl.textContent = `Draws: ${called.size} / 75`;

  // 큰 숫자 애니메이션 (2초 동안 표시 후 사라짐)
  bigcall.textContent = num;
  bigcall.style.opacity = 1;
  setTimeout(() => { bigcall.style.opacity = 0; }, 2000);
}

function resetGame() {
  numbers = Array.from({length:75}, (_,i)=>i+1);
  called.clear();
  recent = [];
  initBoard();
  recentList.innerHTML = '';
  statusEl.textContent = 'Draws: 0 / 75';
  shuffle(numbers);
}

function toggleFullScreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => console.log(err));
  } else {
    document.exitFullscreen();
  }
}

// 입력 이벤트
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    drawNumber();
  }
});

window.addEventListener('click', e => {
  // 버튼 클릭은 제외
  if (e.target.tagName !== 'BUTTON') {
    drawNumber();
  }
});

// 초기화
shuffle(numbers);
initBoard();
</script>

</body>
</html>
