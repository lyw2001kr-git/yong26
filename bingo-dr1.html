<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>임마뉴엘 시니어 센타 ~빙고~ </title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    #container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #board-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      min-width: 0;
      position: relative;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      width: 100%;
      height: 100%;
      max-width: 94vw;
      max-height: 94vh;
      aspect-ratio: 15 / 5;
    }
    .cell {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 5rem);
      font-weight: 400;
      border: 1px solid #333;
      position: relative;
      box-sizing: border-box;
    }
    .drawn .circle {
      position: absolute;
      inset: 5px;
      border: 5px solid red;
      border-radius: 50%;
      pointer-events: none;
    }
    #sidebar {
      width: 180px;
      background: #111;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 1.1rem;
    }
    #status-area, #bingo-count, #mode-display {
      text-align: center;
      padding: 8px;
      background: #222;
      border-radius: 6px;
      margin: 0 8px;
      font-size: 1.3rem;
    }
    #bingo-count {
      font-size: 1.6rem;
      background: #004400;
    }
    #recent {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 8px;
      overflow-y: auto;
    }
    .recent-item {
      font-size: 2.6rem;
      font-weight: bold;
      text-align: center;
      background: #222;
      padding: 10px 0;
      border-radius: 8px;
      opacity: 0.7;
    }
    .recent-item:first-child {
      color: #ff0000;
      background: #330000;
      opacity: 1;
    }
    .control-btn {
      font-size: 1.2rem;
      padding: 10px;
      margin: 4px 8px;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      width: calc(100% - 16px);
    }
    #btn-on { background: #006600; }
    #btn-off { background: #444444; }
    #btn-full { background: #880000; }
    #btn-reset { background: #336699; }
    #btn-clear { background: #8B0000; }
    #large-number {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 35vw;
      font-weight: bold;
      color: red;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 100;
    }
    #won-this-draw {
      position: absolute;
      top: 1vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5vw;
      color: #ff9500;
      padding: 2px 8px;
      white-space: nowrap;
      max-width: 80vw;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      z-index: 90;
      background: none;
    }

    /* 모달 스타일 */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    #modal-content {
      background: #222;
      padding: 25px;
      border-radius: 12px;
      max-width: 85vw;
      max-height: 85vh;
      overflow-y: auto;
      color: #fff;
      text-align: center;
      position: relative;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    #modal-close {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 2.5rem;
      cursor: pointer;
      color: #ff4444;
    }
    #modal-title {
      margin: 0 0 15px;
      font-size: 1.6rem;
    }
    #modal-list {
      font-size: 1.3rem;
      line-height: 1.8;
      word-break: break-all;
      margin: 15px 0;
      text-align: left;
      padding: 10px;
      background: #333;
      border-radius: 8px;
    }
    #modal-confirm {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 1.3rem;
      background: #006600;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #modal-confirm:hover { background: #008800; }
  </style>
</head>
<body>

<div id="large-number"></div>
<div id="won-this-draw"></div>  <!-- 초기 빈 상태 -->

<div id="container">
  <div id="board-area">
    <div id="board"></div>
  </div>

  <div id="sidebar">
    <div id="status-area">드로우: 0/75</div>
    <div id="bingo-count">빙고: 0/0</div>
    <div id="mode-display">현재 모드: OFF</div>

    <div style="display: flex; flex-direction: column; gap: 6px; padding: 0 8px;">
      <button class="control-btn" id="btn-clear">초기화</button>
      <button class="control-btn" id="btn-off">OFF</button>
      <button class="control-btn" id="btn-full">FULL</button>
      <button class="control-btn" id="btn-on">ON</button>
      <button class="control-btn" id="btn-reset">새 판 시작</button>
    </div>

    <div id="recent"></div>
  </div>
</div>

<!-- 모달 -->
<div id="modal">
  <div id="modal-content">
    <span id="modal-close">×</span>
    <h2 id="modal-title">빙고 안 된 카드 번호 목록</h2>
    <div id="modal-list">로딩 중...</div>
    <button id="modal-confirm">확인하고 초기화</button>
  </div>
</div>

<script>
const board = document.getElementById('board');
const recentContainer = document.getElementById('recent');
const largeNum = document.getElementById('large-number');
const bingoCountEl = document.getElementById('bingo-count');
const modeDisplay = document.getElementById('mode-display');
const statusArea = document.getElementById('status-area');
const wonThisDrawEl = document.getElementById('won-this-draw');
const resetBtn = document.getElementById('btn-reset');
const clearBtn = document.getElementById('btn-clear');
const modal = document.getElementById('modal');
const modalList = document.getElementById('modal-list');
const modalClose = document.getElementById('modal-close');
const modalConfirm = document.getElementById('modal-confirm');

let allCards = [];
let playerCards = [];
let called = new Set();
let wonThisCycle = new Set();
let wonThisSession = new Set();
let drawCount = 0;

let currentMode = 'off';

fetch('cards.json')
  .then(res => {
    if (!res.ok) throw new Error("cards.json 파일을 찾을 수 없습니다.");
    return res.json();
  })
  .then(data => {
    allCards = data.map(card => ({
      ...card,
      card_id: String(card.card_id).padStart(3, '0')
    }));
    startNewSession();
  })
  .catch(err => {
    console.error(err);
    alert("cards.json 로드 실패: " + err.message + "\n파일이 같은 폴더에 있는지 확인해주세요.");
  });

function startNewSession() {
  called.clear();
  wonThisSession.clear();
  drawCount = 0;
  assignPlayerCards();
  buildBoard();
  recentContainer.innerHTML = '';
  wonThisDrawEl.textContent = "";
  updateStatus();
  updateBingoDisplay();
  updateModeDisplay();
}

function assignPlayerCards() {
  playerCards = [];
  for (let i = 0; i < 120; i++) {
    const idx = Math.floor(Math.random() * allCards.length);
    playerCards.push(idx);
  }
}

function buildBoard() {
  board.innerHTML = '';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 15; col++) {
      const num = row * 15 + col + 1;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = num;
      cell.dataset.num = num;
      board.appendChild(cell);
    }
  }
}

function isBingo(grid, isFull = false) {
  const calledArr = [...called];
  const flatNonFree = grid.flat().filter(n => n !== "001");

  if (isFull) return flatNonFree.every(n => calledArr.includes(Number(n)));

  let lines = 0;
  for (let r of grid) if (r.every(n => n === "001" || calledArr.includes(Number(n)))) lines++;
  for (let c = 0; c < 5; c++) if (grid.every(r => r[c] === "001" || calledArr.includes(Number(r[c])))) lines++;
  if (grid.every((r,i) => r[i] === "001" || calledArr.includes(Number(r[i])))) lines++;
  if (grid.every((r,i) => r[4-i] === "001" || calledArr.includes(Number(r[4-i])))) lines++;

  return lines >= 1;
}

function updateBingoDisplay() {
  let newThisDraw = 0;
  let wonCardIds = [];

  playerCards.forEach(idx => {
    const card = allCards[idx];
    const cardId = card.card_id;
    const isFullMode = currentMode === 'full';

    if (isBingo(card.grid, isFullMode)) {
      if (!wonThisSession.has(cardId)) {
        wonThisSession.add(cardId);
        newThisDraw++;
        wonCardIds.push(cardId);
      }
      if (!wonThisCycle.has(cardId)) {
        wonThisCycle.add(cardId);
      }
    }
  });

  bingoCountEl.textContent = `빙고: ${newThisDraw}/${wonThisSession.size}`;

  // 빙고된 카드 번호만 콤마로 구분해서 숫자만 표시
  if (wonCardIds.length === 0) {
    wonThisDrawEl.textContent = "";
  } else {
    wonThisDrawEl.textContent = wonCardIds.join(",");
  }

  if (wonThisCycle.size >= allCards.length && currentMode !== 'off') {
    currentMode = 'off';
    updateModeDisplay();
    alert("100장 카드가 모두 최소 1번 당첨되었습니다.\n자동으로 OFF 모드로 전환합니다.");
  }
}

function updateStatus() {
  statusArea.textContent = `드로우: ${drawCount}/75`;
}

function updateModeDisplay() {
  modeDisplay.textContent = `현재 모드: ${currentMode.toUpperCase()}`;
}

// 모달 닫기
modalClose.onclick = () => {
  modal.style.display = 'none';
};

// 모달 확인 및 초기화
modalConfirm.onclick = () => {
  modal.style.display = 'none';
  wonThisCycle.clear();
  startNewSession();
  alert("초기화 완료! 모든 카드 당첨 기록이 지워졌습니다.");
};

// 초기화 버튼 클릭 → 모달 표시
clearBtn.onclick = () => {
  const allCardIds = allCards.map(c => c.card_id);
  const notWon = allCardIds.filter(id => !wonThisCycle.has(id));

  if (notWon.length === 0) {
    modalList.innerHTML = "<strong>모든 카드가 이미 당첨되었습니다.<br>초기화해도 변화가 없을 수 있습니다.</strong>";
  } else {
    modalList.innerHTML = notWon.join(" ");
  }

  modal.style.display = 'flex';
};

// 모드 버튼
document.getElementById('btn-on').onclick = () => { currentMode = 'on'; updateModeDisplay(); };
document.getElementById('btn-off').onclick = () => { currentMode = 'off'; updateModeDisplay(); };
document.getElementById('btn-full').onclick = () => { 
  currentMode = 'full'; 
  updateModeDisplay(); 
};

// 새 판 시작
document.getElementById('btn-reset').onclick = () => {
  startNewSession();
};

// 드로우 함수
function drawNumber() {
  if (called.size >= 75 || drawCount >= 75) {
    alert("이번 판 모든 숫자(75개)가 나왔습니다!");
    return;
  }

  drawCount++;
  updateStatus();

  let candidates = Array.from({length:75}, (_,i)=>i+1).filter(n => !called.has(n));

  if (currentMode === 'on' || currentMode === 'full') {
    const possible = new Set();

    playerCards.forEach(idx => {
      const cid = allCards[idx].card_id;
      if (!wonThisCycle.has(cid)) {
        allCards[idx].grid.flat().forEach(n => {
          const num = Number(n);
          if (n !== "001" && !isNaN(num) && num >= 1 && num <= 75 && !called.has(num)) {
            possible.add(num);
          }
        });
      }
    });

    if (possible.size > 0) {
      candidates = [...possible];
    }
  }

  if (candidates.length === 0) return;

  const num = candidates[Math.floor(Math.random() * candidates.length)];
  called.add(num);

  const cell = board.querySelector(`[data-num="${num}"]`);
  if (cell) {
    const circle = document.createElement('div');
    circle.className = 'circle';
    cell.appendChild(circle);
    cell.classList.add('drawn');
  }

  const recentNums = Array.from(recentContainer.querySelectorAll('.recent-item')).map(el => el.textContent);
  recentNums.unshift(num);
  if (recentNums.length > 5) recentNums.pop();
  recentContainer.innerHTML = recentNums.map(n => `<div class="recent-item">${n}</div>`).join('');

  largeNum.textContent = num;
  largeNum.style.opacity = '1';
  setTimeout(() => largeNum.style.opacity = '0', 1800);

  updateBingoDisplay();
}

// 이벤트 리스너
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    drawNumber();
  }
});

document.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') drawNumber();
});
</script>
</body>
</html>
