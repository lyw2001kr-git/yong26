<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강당 좌석 배치도 (자동 로드 & 검색)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 40px; padding-bottom: 100px; }
        h2 { text-align: center; color: #2c3e50; }
        
        .hall {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 80px 40px;
            max-width: 1400px;
            margin: 40px auto;
        }

        .table-circle {
            position: relative;
            width: 110px; height: 110px;
            background: #fff; border: 4px solid #3498db;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.4s ease;
        }

        /* 검색 결과 강조 스타일 */
        .table-circle.highlight {
            background-color: #f1c40f; /* 노란색 배경 */
            border-color: #f39c12;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6);
        }

        .table-small { width: 80px; height: 80px; border-color: #95a5a6; }
        .table-number { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }

        .spot {
            position: absolute;
            width: 55px; height: 26px;
            background: #f8f9fa; border: 1px solid #ced4da;
            border-radius: 15px; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }

        .occupied { background-color: #e74c3c; color: white; border-color: #c0392b; font-weight: bold; }
        
        /* 찾은 사람 좌석 강조 */
        .spot.found {
            background-color: #ffd700 !important;
            color: #000 !important;
            border: 2px solid #000;
            transform: scale(1.2);
            z-index: 10;
        }

        /* 좌석 배치 위치 */
        .spot:nth-child(2) { top: -35px; left: 50%; transform: translateX(-50%); } 
        .spot:nth-child(3) { top: -5px; right: -40px; }                            
        .spot:nth-child(4) { top: 50%; right: -50px; transform: translateY(-50%); } 
        .spot:nth-child(5) { bottom: -5px; right: -40px; }                         
        .spot:nth-child(6) { bottom: -35px; left: 50%; transform: translateX(-50%); } 
        .spot:nth-child(7) { bottom: -5px; left: -40px; }                          
        .spot:nth-child(8) { top: 50%; left: -50px; transform: translateY(-50%); }  
        .spot:nth-child(9) { top: -5px; left: -40px; }                             

        /* 하단 검색창 고정 스타일 */
        .search-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #2c3e50; padding: 20px;
            text-align: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .search-container input {
            padding: 12px 20px; width: 300px;
            border-radius: 25px; border: none; font-size: 16px;
            outline: none;
        }
        .search-container button {
            padding: 12px 25px; margin-left: 10px;
            border-radius: 25px; border: none;
            background: #e74c3c; color: white; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>강당 좌석 배치 현황</h2>

<div class="hall" id="hall"></div>

<!-- 하단 검색바 -->
<div class="search-container">
    <input type="text" id="searchInput" placeholder="찾으실 성함을 입력하세요..." onkeypress="if(event.keyCode==13) findPerson()">
    <button onclick="findPerson()">검색</button>
</div>

<script>
    // 제공해주신 CSV 데이터를 변수에 직접 저장 (자동 로드)
    const rawData = `.,.,.,.,.,이정호
.,.,.,.,.,김희정
오괜환,오명옥,.,남기우,남현구,방영순
.,이옥희 ,이옥경,.,이명호,이재필
김전녀,백창숙,.,이강평,.,김채은
.,김재섭,박강순,.,이숙자,윤은주
최바울,.,박정숙,.,박재근,.
황찬석,황영자,홍명희,.,최홍규,.
정정남,이문자,안용신,.,김두영,정숙자
고광제,.,안복성,정신원,안상규,주영일
.,.,김영순,.,임귀순,박은순
.,.,박장현,.,.,김종수
.,우성순,루시아김,.,송문자,황기순
한명숙,노희자,장정옥,홍희자,홍명숙,손기수
인장만,.,임폴,.,한옥자,.
계금옥,장경자,김춘자,봉영은,레베카김,.
.,.,이난곤,김삼례,이정기,이재순
.,이흥수,김창덕,.,손양선,이윤희
.,.,.,.,.,정순도
.,박의순,한고명,.,한현숙,박상균
.,김재정,서상경,.,김옥희,신순향
.,이영주,손옥희,박혜옥,이명자,최명현
김판도,.,.,장영숙,이영자,김형강
.,정순자,신무순,.,.,오경림
이용상,이양숙,최호,.,.,김원태
강경자,.,김성숙,최평화,에드윈김,.
이희우,.,.,김강숙,김만식,신경애
.,양옥희,김정형,정문철,박복동,이명환
.,.,김풍자,김경숙,엔젤라김,테레샤김
이춘복,.,이숙,.,이수현,김방현
.,이정옥,.,.,명계현,이춘자
.,이영애,김화순,.,김형복,이원선
한송자,남은숙,기갑분,.,함성분,김옥남
.,.,.,.,.,.
곽마이크,.,이문식,이경희,이상분,곽정자
.,.,.,.,.,.
.,정한국,황성희,.,김정구,정현찬`;

    const hall = document.getElementById('hall');
    const smallTables = [1, 2, 19];

    // 레이아웃 생성 및 데이터 채우기
    function init() {
        const lines = rawData.split('\n');
        
        for (let i = 1; i <= 37; i++) {
            const table = document.createElement('div');
            table.className = 'table-circle' + (smallTables.includes(i) ? ' table-small' : '');
            table.id = `table-${i}`;
            
            const numDiv = document.createElement('div');
            numDiv.className = 'table-number';
            numDiv.innerText = i;
            table.appendChild(numDiv);

            const names = (lines[i-1] || "").split(',').map(n => n.trim());

            for (let j = 1; j <= 8; j++) {
                const spot = document.createElement('div');
                spot.className = 'spot';
                spot.id = `seat-${i}-${j}`;
                
                const name = names[j-1];
                if (name && name !== "." && name !== "") {
                    spot.innerText = name;
                    spot.classList.add('occupied');
                }
                table.appendChild(spot);
            }
            hall.appendChild(table);
        }
    }

    // 이름 검색 함수
    function findPerson() {
        const keyword = document.getElementById('searchInput').value.trim();
        
        // 기존 강조 효과 제거
        document.querySelectorAll('.table-circle').forEach(t => t.classList.remove('highlight'));
        document.querySelectorAll('.spot').forEach(s => s.classList.remove('found'));

        if (!keyword) return;

        let found = false;
        document.querySelectorAll('.spot.occupied').forEach(spot => {
            if (spot.innerText.includes(keyword)) {
                const parentTable = spot.closest('.table-circle');
                parentTable.classList.add('highlight');
                spot.classList.add('found');
                
                // 해당 위치로 스크롤 이동
                if (!found) {
                    parentTable.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    found = true;
                }
            }
        });

        if (!found) alert("해당 성함을 찾을 수 없습니다.");
    }

    init();
</script>

</body>
</html>
