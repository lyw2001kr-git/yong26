<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강당 좌석 배치도</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 10px; padding-bottom: 150px; margin: 0; overflow-x: hidden; }
        h2 { text-align: center; color: #2c3e50; font-size: 1.5rem; margin: 20px 0; }
        
        /* 가로 스크롤 가능하게 변경 */
        .scroll-wrapper {
            width: 100%;
            overflow-x: auto; /* 가로 스크롤 활성화 */
            padding-bottom: 50px;
            -webkit-overflow-scrolling: touch;
        }

        .hall {
            display: grid;
            grid-template-columns: repeat(6, 150px); /* 6열 고정, 각 너비 120px */
            gap: 80px 25px; 
            width: max-content; /* 내용물만큼 너비 확장 */
            margin: 0 auto;
            padding: 40px 20px;
        }

        .table-circle {
            position: relative;
            width: 85px; height: 85px;
            background: #fff; border: 3px solid #3498db;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .table-small { width: 45px; height: 45px; border-color: #95a5a6; }
        .table-small .table-number { font-size: 0.8rem; }

        .table-circle.highlight {
            background-color: #f1c40f;
            border-color: #f39c12;
            transform: scale(1.15);
            z-index: 50;
        }

        .table-number { font-size: 1.1rem; font-weight: bold; color: #2c3e50; pointer-events: none; }

        .spot {
            position: absolute;
            font-size: 13px; 
            font-weight: bold;
            color: transparent;
            white-space: nowrap;
            text-align: center;
        }

        .occupied { color: #333; } 
        
        .spot.found {
            background-color: #e74c3c !important;
            color: #fff !important;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 15px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* 좌석 위치 */
        .spot:nth-child(2) { top: -22px; left: 50%; transform: translateX(-50%); } 
        .spot:nth-child(3) { top: 0px; right: -25px; }                            
        .spot:nth-child(4) { top: 50%; right: -35px; transform: translateY(-50%); } 
        .spot:nth-child(5) { bottom: 0px; right: -25px; }                         
        .spot:nth-child(6) { bottom: -22px; left: 50%; transform: translateX(-50%); } 
        .spot:nth-child(7) { bottom: 0px; left: -25px; }                          
        .spot:nth-child(8) { top: 50%; left: -35px; transform: translateY(-50%); }  
        .spot:nth-child(9) { top: 0px; left: -25px; }                             

        .layout-note {
            grid-column: span 2;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #e67e22;
            font-weight: bold;
            white-space: nowrap;
        }

        .search-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #2c3e50; padding: 25px 0;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3); z-index: 1000;
        }
        .search-container input {
            padding: 15px 20px; width: 60%; max-width: 250px;
            border-radius: 30px 0 0 30px; border: none; font-size: 18px; outline: none;
        }
        .search-container button {
            padding: 15px 25px; border-radius: 0 30px 30px 0; border: none;
            background: #e74c3c; color: white; font-weight: bold; cursor: pointer; font-size: 18px;
        }
    </style>
</head>
<body>

<h2>강당 좌석 배치 현황</h2>

<div class="scroll-wrapper">
    <div class="hall" id="hall"></div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="성함 입력..." onkeypress="if(event.keyCode==13) findPerson()">
    <button onclick="findPerson()">찾기</button>
</div>

<script>
    const rawData = `.,.,.,.,.,이정호
.,.,.,.,.,김희정
오괜환,오명옥,.,.,남기우,남현구,.,방영순
.,이옥희 ,.,.,이옥경,.,이명호,이재필
.,백창숙,.,.,.,이강평,김채은,김전녀
.,김재섭,.,박강순,.,이숙자,.,윤은주
최바울,.,.,.,박정숙,.,박재근,.
황찬석,황영자,.,.,홍명희,.,최홍규,.
정정남,이문자,안용신,.,.,.,김두영,정숙자
고광제,.,안복성,정신원,안상규,.,주영일
.,임귀순,.,김영순,.,.,박은순
.,.,.,박장현,.,.,.,김종수
.,우성순,루시아김,.,송문자,.,.,황기순
한명숙,노희자,장정옥,홍희자,홍명숙,.,손기수
인장만,.,.,.,임폴,.,한옥자,.
계금옥,장경자,김춘자,봉영은,.,레베카김,.
.,이난곤,.,김삼례,.,.,이정기,이재순
.,이흥수,.,.,.,.,이윤희
.,.,.,.,.,정순도
.,테레사,.,박의순,.,박상균,.,박상균
.,김재정,.,서상경,.,김옥희,.,신순향
.,이영주,.,손옥희,.,박혜옥,이명자,최명현
김판도,.,.,장영숙,.,이영자,김형강
정순자,.,.,신무순,.,.,오경림
이용상,이양숙,.,.,최호,.,.,김원태
강경자,.,김성숙,최평화,.,에드윈김,.
이희우,.,.,김강숙,김만식,신경애
.,.,.,양옥희,김정형,정문철,박복동,이명환
김퐁자,.,.,.,서순희,.,.,김경숙
감방현,.,.,이숙,.,이수현,.,
.,이정옥,.,.,명계현,.,.,이춘자
.,이영애,.,.,김화순,.,김형복,이원선
한송자,남은숙,.,기갑분,함성분,.,김옥남
.,.,.,.,.,.
곽마이크,.,이문식,이경희,이상분,.,.,곽정자
.,.,.,.,.,.
정한국,.,.,황성희,.,김정구,.,정현찬`;

    const hall = document.getElementById('hall');
    const smallTables = [1, 2, 19]; 

    function init() {
        const lines = rawData.split('\n');
        for (let i = 1; i <= 37; i++) {
            const table = document.createElement('div');
            table.className = 'table-circle' + (smallTables.includes(i) ? ' table-small' : '');
            table.id = `table-${i}`;
            
            const numDiv = document.createElement('div');
            numDiv.className = 'table-number';
            numDiv.innerText = i;
            table.appendChild(numDiv);

            const names = (lines[i-1] || "").split(',').map(n => n.trim());
            for (let j = 1; j <= 8; j++) {
                const spot = document.createElement('div');
                spot.className = 'spot';
                const name = names[j-1];
                if (name && name !== "." && name !== "") {
                    spot.innerText = name;
                    spot.classList.add('occupied');
                }
                table.appendChild(spot);
            }
            hall.appendChild(table);

            if (i === 37) {
                const note = document.createElement('div');
                note.className = 'layout-note';
                note.innerText = "                              뒤쪽에서 본 레이아웃 입니다.";
                hall.appendChild(note);
            }
        }
    }

    function findPerson() {
        const keyword = document.getElementById('searchInput').value.trim();
        document.querySelectorAll('.table-circle').forEach(t => t.classList.remove('highlight'));
        document.querySelectorAll('.spot').forEach(s => s.classList.remove('found'));

        if (!keyword) return;

        let found = false;
        document.querySelectorAll('.spot.occupied').forEach(spot => {
            if (spot.innerText.includes(keyword)) {
                const parentTable = spot.closest('.table-circle');
                parentTable.classList.add('highlight');
                spot.classList.add('found');
                if (!found) {
                    // 가로 스크롤을 고려한 정렬
                    parentTable.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    found = true;
                }
            }
        });
        if (!found) alert("성함을 찾을 수 없습니다.");
    }

    init();
</script>
</body>
</html>
