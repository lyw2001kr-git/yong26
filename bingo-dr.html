<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>시니어 센터 빙고 드로우</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    #container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #board-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      min-width: 0;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      width: 100%;
      height: 100%;
      max-width: 94vw;
      max-height: 94vh;
      aspect-ratio: 15 / 5;
    }
    .cell {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 5rem);
      font-weight: 400;
      border: 1px solid #333;
      position: relative;
      box-sizing: border-box;
    }
    .drawn .circle {
      position: absolute;
      inset: 5px;
      border: 5px solid red;
      border-radius: 50%;
      pointer-events: none;
    }
    #sidebar {
      width: 180px;
      background: #111;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #bingo-count {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      padding: 12px;
      background: #004400;
      border-radius: 10px;
      margin: 0 8px;
    }
    #mode-display {
      text-align: center;
      font-size: 1.6rem;
      padding: 6px;
      background: #222;
      border-radius: 8px;
      margin: 0 8px;
    }
    #recent {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 8px;
      overflow-y: auto;
    }
    .recent-item {
      font-size: 2.6rem;
      font-weight: bold;
      text-align: center;
      background: #222;
      padding: 10px 0;
      border-radius: 8px;
      opacity: 0.7;
    }
    .recent-item:first-child {
      color: #ff0000;
      background: #330000;
      opacity: 1;
    }
    .mode-btn {
      font-size: 1.3rem;
      padding: 8px 16px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
    #btn-on { background: #006600; }
    #btn-off { background: #444444; }
    #btn-full { background: #880000; }
    #large-number {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 35vw;
      font-weight: bold;
      color: red;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 100;
    }
  </style>
</head>
<body>

<div id="large-number"></div>

<div id="container">
  <div id="board-area">
    <div id="board"></div>
  </div>

  <div id="sidebar">
    <div id="bingo-count">빙고: 0/0</div>
    <div id="mode-display">현재 모드: OFF</div>
    <div style="text-align:center; padding:8px;">
      <button class="mode-btn" id="btn-on">ON</button>
      <button class="mode-btn" id="btn-off">OFF</button>
      <button class="mode-btn" id="btn-full">FULL</button>
    </div>
    <div id="recent"></div>
    <button id="reset-btn" style="margin:10px auto; padding:10px 30px; font-size:1.4rem; background:#444; color:white; border:none; border-radius:8px; cursor:pointer;">다시 시작</button>
  </div>
</div>

<script>
const board = document.getElementById('board');
const recentContainer = document.getElementById('recent');
const largeNum = document.getElementById('large-number');
const bingoCountEl = document.getElementById('bingo-count');
const modeDisplay = document.getElementById('mode-display');
const resetBtn = document.getElementById('reset-btn');

let allCards = [];
let playerCards = [];
let called = new Set();
let totalWonToday = new Set();     // 오늘 빙고/풀카바 된 card_id 누적 (localStorage)
let currentBingoCount = 0;         // 이번 세션(이번 실행 후) 빙고 된 사람 수

const TODAY = new Date().toDateString();
const STORAGE_KEY = 'bingo_total_won_today';

let currentMode = 'off';

fetch('cards.json')
  .then(res => res.json())
  .then(data => {
    allCards = data;
    initGame();
  })
  .catch(err => {
    console.error(err);
    alert("cards.json 파일을 찾을 수 없습니다.");
  });

function initGame() {
  loadTotalWon();
  assignPlayerCards();
  buildBoard();
  updateBingoDisplay();
  updateModeDisplay();
}

function loadTotalWon() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const data = JSON.parse(saved);
    if (data.date === TODAY) {
      totalWonToday = new Set(data.cardIds.map(String));
    }
  }
  currentBingoCount = 0;
}

function saveTotalWon() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: TODAY,
    cardIds: Array.from(totalWonToday)
  }));
}

function assignPlayerCards() {
  playerCards = [];
  for (let i = 0; i < 120; i++) {
    const idx = Math.floor(Math.random() * allCards.length);
    playerCards.push(idx);
  }
}

function buildBoard() {
  board.innerHTML = '';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 15; col++) {
      const num = row * 15 + col + 1;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = num;
      cell.dataset.num = num;
      board.appendChild(cell);
    }
  }
}

function isBingo(grid, isFull = false) {
  const calledArr = [...called];
  const flat = grid.flat().filter(n => n !== "001");

  if (isFull) {
    return flat.every(n => calledArr.includes(Number(n)));
  }

  let lines = 0;
  for (let r of grid) {
    if (r.every(n => n === "001" || calledArr.includes(Number(n)))) lines++;
  }
  for (let c = 0; c < 5; c++) {
    if (grid.every(r => r[c] === "001" || calledArr.includes(Number(r[c])))) lines++;
  }
  if (grid.every((r,i) => r[i] === "001" || calledArr.includes(Number(r[i])))) lines++;
  if (grid.every((r,i) => r[4-i] === "001" || calledArr.includes(Number(r[4-i])))) lines++;

  return lines >= 1;
}

function updateBingoDisplay() {
  let thisDrawNew = 0;

  playerCards.forEach(idx => {
    const card = allCards[idx];
    const cardId = String(card.card_id);
    const isFullMode = currentMode === 'full';

    if (isBingo(card.grid, isFullMode)) {
      if (!totalWonToday.has(cardId)) {
        totalWonToday.add(cardId);
        thisDrawNew++;
        saveTotalWon();
      }
    }
  });

  currentBingoCount += thisDrawNew;
  const totalToday = totalWonToday.size;

  bingoCountEl.textContent = `빙고: ${thisDrawNew}/${totalToday}`;
}

function updateModeDisplay() {
  modeDisplay.textContent = `현재 모드: ${currentMode.toUpperCase()}`;
}

// 모드 변경 (팝업 없이)
document.getElementById('btn-on').onclick = () => { currentMode = 'on'; updateModeDisplay(); };
document.getElementById('btn-off').onclick = () => { currentMode = 'off'; updateModeDisplay(); };
document.getElementById('btn-full').onclick = () => { currentMode = 'full'; updateModeDisplay(); };

// 드로우
function drawNumber() {
  if (called.size >= 75) return alert("모든 숫자 소진!");

  let candidates = Array.from({length:75}, (_,i)=>i+1).filter(n => !called.has(n));

  if (currentMode === 'on' && totalWonToday.size < allCards.length) {
    const possible = new Set();
    playerCards.forEach(idx => {
      const cid = allCards[idx].card_id;
      if (!totalWonToday.has(cid)) {
        allCards[idx].grid.flat().forEach(n => {
          if (n !== "001" && !called.has(Number(n))) possible.add(Number(n));
        });
      }
    });
    if (possible.size > 0) candidates = [...possible];
  }

  const num = candidates[Math.floor(Math.random() * candidates.length)];
  if (!num) return;

  called.add(num);

  const cell = board.querySelector(`[data-num="${num}"]`);
  if (cell) {
    const circle = document.createElement('div');
    circle.className = 'circle';
    cell.appendChild(circle);
    cell.classList.add('drawn');
  }

  // 최근 5개 업데이트 (최신이 첫 번째, 빨강)
  const recentNums = Array.from(recentContainer.querySelectorAll('.recent-item')).map(el => el.textContent);
  recentNums.unshift(num);
  if (recentNums.length > 5) recentNums.pop();
  recentContainer.innerHTML = recentNums.map(n => `<div class="recent-item">${n}</div>`).join('');

  largeNum.textContent = num;
  largeNum.style.opacity = '1';
  setTimeout(() => largeNum.style.opacity = '0', 1800);

  updateBingoDisplay();
}

// 이벤트
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    drawNumber();
  }
});

document.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') drawNumber();
});

resetBtn.onclick = () => {
  if (!confirm("보드와 이번 세션 빙고만 초기화합니다. 오늘 총 누적은 유지됩니다.")) return;

  called.clear();
  currentBingoCount = 0;
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('drawn');
    c.innerHTML = c.dataset.num;
  });
  recentContainer.innerHTML = '';
  updateBingoDisplay();
};

// 시작
</script>
</body>
</html>
