<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>시니어 센터 빙고 드로우</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    #container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #board-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      min-width: 0;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      width: 100%;
      height: 100%;
      max-width: 94vw;
      max-height: 94vh;
      aspect-ratio: 15 / 5;
    }
    .cell {
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 5rem);
      font-weight: 400;
      border: 1px solid #333;
      position: relative;
      box-sizing: border-box;
    }
    .drawn .circle {
      position: absolute;
      inset: 5px;
      border: 5px solid red;
      border-radius: 50%;
      pointer-events: none;
    }
    #sidebar {
      width: 180px;
      background: #111;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #status-area {
      text-align: center;
      font-size: 1.8rem;
      padding: 10px;
      background: #222;
      border-radius: 8px;
      margin: 0 8px;
    }
    #bingo-count {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      padding: 12px;
      background: #004400;
      border-radius: 10px;
      margin: 0 8px;
    }
    #mode-display {
      text-align: center;
      font-size: 1.6rem;
      padding: 6px;
      background: #222;
      border-radius: 8px;
      margin: 0 8px;
    }
    #recent {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 8px;
      overflow-y: auto;
    }
    .recent-item {
      font-size: 2.6rem;
      font-weight: bold;
      text-align: center;
      background: #222;
      padding: 10px 0;
      border-radius: 8px;
      opacity: 0.7;
    }
    .recent-item:first-child {
      color: #ff0000;
      background: #330000;
      opacity: 1;
    }
    .mode-btn, .reset-btn, .clear-btn {
      font-size: 1.3rem;
      padding: 10px 20px;
      margin: 6px auto;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: block;
      width: 80%;
    }
    #btn-on { background: #006600; }
    #btn-off { background: #444444; }
    #btn-full { background: #880000; }
    #reset-btn { background: #555; }
    #clear-btn { background: #8B0000; } /* 진한 빨강으로 강조 */
    #large-number {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 35vw;
      font-weight: bold;
      color: red;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 100;
    }
  </style>
</head>
<body>

<div id="large-number"></div>

<div id="container">
  <div id="board-area">
    <div id="board"></div>
  </div>

  <div id="sidebar">
    <div id="status-area">드로우: 0/75</div>
    <div id="bingo-count">빙고: 0/0</div>
    <div id="mode-display">현재 모드: OFF</div>
    <div style="text-align:center; padding:8px;">
      <button class="mode-btn" id="btn-on">ON</button>
      <button class="mode-btn" id="btn-off">OFF</button>
      <button class="mode-btn" id="btn-full">FULL</button>
    </div>
    <button id="clear-btn">초기화 (전체 리셋)</button>
    <button id="reset-btn">새 판 시작</button>
    <div id="recent"></div>
  </div>
</div>

<script>
const board = document.getElementById('board');
const recentContainer = document.getElementById('recent');
const largeNum = document.getElementById('large-number');
const bingoCountEl = document.getElementById('bingo-count');
const modeDisplay = document.getElementById('mode-display');
const statusArea = document.getElementById('status-area');
const resetBtn = document.getElementById('reset-btn');
const clearBtn = document.getElementById('clear-btn');

let allCards = [];
let playerCards = [];
let called = new Set();
let wonThisCycle = new Set();   // 전체 사이클 누적 (100장 채워지면 off 전환)
let wonThisSession = new Set(); // 이번 판 새로 당첨된 카드 (표시용)
let drawCount = 0;

let currentMode = 'off';

fetch('cards.json')
  .then(res => res.json())
  .then(data => {
    allCards = data;
    startNewSession();
  })
  .catch(err => alert("cards.json 로드 실패: " + err));

function startNewSession() {
  called.clear();
  wonThisSession.clear();
  drawCount = 0;
  assignPlayerCards();
  buildBoard();
  recentContainer.innerHTML = '';
  updateStatus();
  updateBingoDisplay();
  updateModeDisplay();
}

function assignPlayerCards() {
  playerCards = [];
  for (let i = 0; i < 120; i++) {
    const idx = Math.floor(Math.random() * allCards.length);
    playerCards.push(idx);
  }
}

function buildBoard() {
  board.innerHTML = '';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 15; col++) {
      const num = row * 15 + col + 1;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = num;
      cell.dataset.num = num;
      board.appendChild(cell);
    }
  }
}

function isBingo(grid, isFull = false) {
  const calledArr = [...called];
  const flatNonFree = grid.flat().filter(n => n !== "001");

  if (isFull) return flatNonFree.every(n => calledArr.includes(Number(n)));

  let lines = 0;
  for (let r of grid) if (r.every(n => n === "001" || calledArr.includes(Number(n)))) lines++;
  for (let c = 0; c < 5; c++) if (grid.every(r => r[c] === "001" || calledArr.includes(Number(r[c])))) lines++;
  if (grid.every((r,i) => r[i] === "001" || calledArr.includes(Number(r[i])))) lines++;
  if (grid.every((r,i) => r[4-i] === "001" || calledArr.includes(Number(r[4-i])))) lines++;

  return lines >= 1;
}

function updateBingoDisplay() {
  let newThisDraw = 0;

  playerCards.forEach(idx => {
    const card = allCards[idx];
    const cardId = String(card.card_id);
    const isFullMode = currentMode === 'full';

    if (isBingo(card.grid, isFullMode)) {
      if (!wonThisSession.has(cardId)) {
        wonThisSession.add(cardId);
        newThisDraw++;
      }
      if (!wonThisCycle.has(cardId)) {
        wonThisCycle.add(cardId);
      }
    }
  });

  bingoCountEl.textContent = `빙고: ${newThisDraw}/${wonThisSession.size}`;

  // 100장 모두 당첨 시 자동 off 전환
  if (wonThisCycle.size >= allCards.length && currentMode !== 'off') {
    currentMode = 'off';
    updateModeDisplay();
    alert("100장 카드가 모두 최소 1번 당첨되었습니다.\n자동으로 OFF 모드(랜덤)로 전환합니다.");
  }
}

function updateStatus() {
  statusArea.textContent = `드로우: ${drawCount}/75`;
  modeDisplay.textContent = `현재 모드: ${currentMode.toUpperCase()}`;
}

// 모드 버튼
document.getElementById('btn-on').onclick = () => { currentMode = 'on'; updateModeDisplay(); };
document.getElementById('btn-off').onclick = () => { currentMode = 'off'; updateModeDisplay(); };
document.getElementById('btn-full').onclick = () => { currentMode = 'full'; updateModeDisplay(); };

// 드로우
function drawNumber() {
  if (called.size >= 75 || drawCount >= 75) {
    alert("이번 판 모든 숫자(75개)가 나왔습니다!");
    return;
  }

  drawCount++;
  updateStatus();

  let candidates = Array.from({length:75}, (_,i)=>i+1).filter(n => !called.has(n));

  if ((currentMode === 'on' || currentMode === 'full') && wonThisCycle.size < allCards.length) {
    const possible = new Set();
    playerCards.forEach(idx => {
      const cid = allCards[idx].card_id;
      if (!wonThisCycle.has(cid)) {
        allCards[idx].grid.flat().forEach(n => {
          const num = Number(n);
          if (n !== "001" && !isNaN(num) && num >= 1 && num <= 75 && !called.has(num)) {
            possible.add(num);
          }
        });
      }
    });
    if (possible.size > 0) candidates = [...possible];
  }

  if (candidates.length === 0) return alert("더 이상 뽑을 숫자가 없습니다.");

  const num = candidates[Math.floor(Math.random() * candidates.length)];
  called.add(num);

  const cell = board.querySelector(`[data-num="${num}"]`);
  if (cell) {
    const circle = document.createElement('div');
    circle.className = 'circle';
    cell.appendChild(circle);
    cell.classList.add('drawn');
  }

  const recentNums = Array.from(recentContainer.querySelectorAll('.recent-item')).map(el => el.textContent);
  recentNums.unshift(num);
  if (recentNums.length > 5) recentNums.pop();
  recentContainer.innerHTML = recentNums.map(n => `<div class="recent-item">${n}</div>`).join('');

  largeNum.textContent = num;
  largeNum.style.opacity = '1';
  setTimeout(() => largeNum.style.opacity = '0', 1800);

  updateBingoDisplay();
}

// 이벤트
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    drawNumber();
  }
});

document.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') drawNumber();
});

// 새 판 시작 (이번 판 초기화)
resetBtn.onclick = () => {
  if (confirm("새 판을 시작합니다.\n(이번 판 빙고/드로우 초기화)")) {
    startNewSession();
  }
};

// 전체 초기화 (모든 당첨 기록 삭제)
clearBtn.onclick = () => {
  if (confirm("전체 초기화 하시겠습니까?\n(모든 카드 당첨 기록이 삭제되고 처음부터 시작합니다)")) {
    wonThisCycle.clear();
    startNewSession();
  }
};
</script>
</body>
</html>
