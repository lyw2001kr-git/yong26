<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식당 배식 시작</title>
<style>
body {
  font-family: 'Malgun Gothic', sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: #fff8e1;
  text-align: center;
}

h1 {
  color: #d35400;
  margin-bottom: 20px;
}

img {
  width: 150px;
  height: 150px;
  margin-bottom: 20px;
}

button {
  padding: 15px 30px;
  font-size: 1.2rem;
  border: none;
  border-radius: 12px;
  background-color: #27ae60;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #2ecc71;
}

#message {
  margin-top: 20px;
  font-size: 1.3rem;
  color: #2c3e50;
}
</style>
</head>
<body>

<h1>식당 배식을 시작합니다 🍽️</h1>
<img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="식사 아이콘">
<button onclick="startServing()">배식 시작</button>
<div id="message"></div>

<script>
function startServing() {
  const msg = document.getElementById('message');
  msg.innerText = "✅ 배식이 시작되었습니다! 맛있게 드세요!";
}
</script>

</body>
</html>
