<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>기사 정보</title>

<style>

body{
font-family:'Malgun Gothic',sans-serif;
background:#f4f7f6;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#2c3e50;
margin-bottom:40px;
}

.menu{
max-width:400px;
margin:auto;
}

button{
width:100%;
padding:18px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
}

.btn1{background:#3498db}
.btn2{background:#27ae60}
.btn3{background:#e67e22}
.btn4{background:#9b59b6}

button:hover{
opacity:0.85;
}

</style>
</head>

<body>

<h1>기사 정보</h1>

<div class="menu">

<button class="btn1" onclick="checkAttendance()">출석 체크</button>

<button class="btn2" onclick="checkTable()">자석 배치</button>

<button class="btn3" onclick="checkBingo()">빙고 드로</button>

<button class="btn4" onclick="checkTel()">기사 전번</button>

</div>

<script>

async function checkAttendance(){

let pass=prompt("비밀번호 입력")

if(pass==="000"){
location.href="ch-table.html"
}else{
alert("비밀번호 틀림")
}

}

async function checkBingo(){

let pass=prompt("비밀번호 입력")

if(pass==="111"){
location.href="bingo-dr2-sound-ch.html"
}else{
alert("비밀번호 틀림")
}

}

async function checkTable(){

let pass=prompt("전화번호 뒤 4자리")

const res=await fetch("tel.json")

const users=await res.json()

const ok=users.find(u=>u.password===pass)

if(ok){
location.href="ch-table1.html"
}else{
alert("권한 없음")
}

}

async function checkTel(){

let pass=prompt("전화번호 뒤 4자리")

const res=await fetch("tel.json")

const users=await res.json()

const ok=users.find(u=>u.password===pass)

if(ok){
location.href="sound-on-off.html"
}else{
alert("권한 없음")
}

}

</script>

</body>
</html>
