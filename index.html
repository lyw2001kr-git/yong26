<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Information</title>

<style>

body{
font-family:'Malgun Gothic',sans-serif;
background:#f4f7f6;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#2c3e50;
margin-bottom:40px;
}

.menu{
max-width:400px;
margin:auto;
}

button{
width:100%;
padding:18px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
}

.btn1{background:#3498db}
.btn2{background:#27ae60}
.btn3{background:#e67e22}
.btn4{background:#9b59b6}

button:hover{
opacity:0.85;
}

</style>
</head>

<body>

<h1>Emmanuel</h1>

<div class="menu">

<button class="btn1" onclick="checkAccess('attendance.html')">출 석 체 크</button>
<button class="btn2" onclick="checkAccess('table-layout.html')">홀 좌석 배치도</button>
<button class="btn3" onclick="checkAccess('bingo-draw.html')">자동 빙고 드로</button>
<button class="btn4" onclick="checkAccess('staff-phone-number.html')">직원들 연락처</button>

</div>

<script>

// 공통 함수: 전화번호 뒤 4자리로 인증
async function checkAccess(redirectUrl){
    let pass = prompt("전화번호 뒤 4자리 입력")
    if(!pass) return;

    try {
        const res = await fetch("tel.json")
        const users = await res.json()
        const ok = users.find(u => u.password === pass)
        if(ok){
            location.href = redirectUrl
        } else {
            alert("권한 없음")
        }
    } catch(err){
        console.error(err)
        alert("데이터를 불러올 수 없습니다.")
    }
}

</script>

</body>
</html>
